# Deploy with `fly deploy` from the repo root (build context = repo root).

app = "leon-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  # Push reminders (Redis/BullMQ worker) need the machine awake:
  # auto_stop_machines = "off", min_machines_running = 1 (see REMINDERS_DEPLOY.md).

  [[http_service.checks]]
    method = "GET"
    path = "/api/health/live"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
